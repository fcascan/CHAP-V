[MY_HTOP_PATH]
npu_load_path = /sys/kernel/debug/rknpu/load
npu_freq_path = /sys/class/devfreq/fdab0000.npu/cur_freq
gpu_load_path = /sys/devices/platform/fb000000.gpu/devfreq/fb000000.gpu/load
gpu_freq_path = /sys/devices/platform/fb000000.gpu/devfreq/fb000000.gpu/cur_freq
cpu_freq_pattern = /sys/devices/system/cpu/cpu{core}/cpufreq/scaling_cur_freq

[MODE]
benchmark_mode = true

[WEB]
enabled = false
host = 0.0.0.0
port = 8080

[INFERENCE]
device = NPU
rockchip_target = rk3588
obj_threshold = 0.5
nms_threshold = 0.45
debug_mode = false

[PATHS]
model_rknn = assets/models/april22_2.rknn
model_onnx = assets/models/april22_2.onnx
model_labels = assets/models/april22_2.txt
benchmark_video = assets/videos/benchmark.mp4

[IMAGE]
img_width = 640
img_height = 640
fps_text_size = 0.5
label_text_size = 0.4

[CAMERA]
max_cameras_to_scan = 6

[CLASSES]
default_labels = pistol,knife
