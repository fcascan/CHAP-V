[MY_HTOP_PATH]
npu_load_path = /sys/kernel/debug/rknpu/load
npu_freq_path = /sys/class/devfreq/fdab0000.npu/cur_freq
gpu_load_path = /sys/devices/platform/fb000000.gpu/devfreq/fb000000.gpu/load
gpu_freq_path = /sys/devices/platform/fb000000.gpu/devfreq/fb000000.gpu/cur_freq
cpu_freq_pattern = /sys/devices/system/cpu/cpu{core}/cpufreq/scaling_cur_freq

[MODE]
benchmark_mode = true

[WEB]
enabled = false
host = 0.0.0.0
port = 8080

[INFERENCE]
device = NPU

[PATHS]
model_rknn = assets/models/Crime_Detection_1-640-640-yolov11n.rknn
model_onnx = assets/models/yolo11n.onnx
model_labels = assets/models/labels.txt
benchmark_video = assets/videos/benchmark2.mp4

[IMAGE]
img_width = 640
img_height = 640
fps_text_size = 0.5
label_text_size = 0.4

[CAMERA]
max_cameras_to_scan = 3

[CLASSES]
default_labels = hands up,kneeling,knife,pistol,rifle,person

