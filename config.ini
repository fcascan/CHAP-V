[MY_HTOP_PATH]
npu_load_path = /sys/kernel/debug/rknpu/load
npu_freq_path = /sys/class/devfreq/fdab0000.npu/cur_freq
gpu_load_path = /sys/devices/platform/fb000000.gpu/devfreq/fb000000.gpu/load
gpu_freq_path = /sys/devices/platform/fb000000.gpu/devfreq/fb000000.gpu/cur_freq
cpu_freq_pattern = /sys/devices/system/cpu/cpu{core}/cpufreq/scaling_cur_freq

[MODE]
benchmark_mode = true

[WEB]
enabled = false
host = 0.0.0.0
port = 8080

[INFERENCE]
inference_device = GPU-MNN
rockchip_target = rk3588
obj_threshold = 0.5
nms_threshold = 0.45
debug_mode = true
max_inference_instances = 1
npu_core_assignment = distributed
max_detections_per_frame = 50
cpu50_threads = 4
cpu50_affinity = 4,5,6,7
mnn_precision = low
mnn_backend = OPENCL

[PATHS]
model_rknn = assets/models/detectS2.rknn
model_onnx = assets/models/detectS2.onnx
model_mnn = assets/models/detectS2.mnn
model_labels = assets/models/detectS2.txt
benchmark_video_0 = assets/videos/benchmark.mp4
benchmark_video_1 = assets/videos/benchmark.mp4
benchmark_video_2 = assets/videos/benchmark.mp4

[IMAGE]
img_width = 640
img_height = 640
fps_text_size = 0.5
label_text_size = 0.4
show_overlay = true
overlay_text_color = 255,255,255
save_debug_frames = false

[DETECTION]
box_color = 0,0,255
label_text_color = 255,255,255
label_background_color = 0,0,255
box_thickness = 2
label_text_size = 0.45
label_text_thickness = 2

[CLASSES]
default_labels = pistol,knife

