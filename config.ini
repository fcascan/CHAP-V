[MY_HTOP_PATH]
# Path to the NPU load file
npu_load_path = /sys/kernel/debug/rknpu/load
# Path to the NPU frequency file
npu_freq_path = /sys/class/devfreq/fdab0000.npu/cur_freq
# Path to the GPU load file
gpu_load_path = /sys/devices/platform/fb000000.gpu/devfreq/fb000000.gpu/load
# Path to the GPU frequency file
gpu_freq_path = /sys/devices/platform/fb000000.gpu/devfreq/fb000000.gpu/cur_freq
# Path to the CPU frequency files (pattern)
cpu_freq_pattern = /sys/devices/system/cpu/cpu{core}/cpufreq/scaling_cur_freq

[MODE]
benchmark_mode = true

[INFERENCE]
# Set to 'NPU', 'GPU' or 'CPU'
device = NPU

[PATHS]
model_rknn = assets/models/yolo11n_rk3588 (1).rknn
model_onnx = assets/models/yolo11n (2).onnx
model_labels = assets/models/threads_detection_1-640-640-yolov11n.txt
benchmark_video = assets/videos/benchmark2.mp4
#Shooting046_x264.mp4

[IMAGE]
img_width = 640
img_height = 640
fps_text_size = 0.5
label_text_size = 0.4

[CAMERA]
max_cameras_to_scan = 6

[CLASSES]
# Default labels to use if no model_labels file is provided
default_labels = hands up,kneeling,knife,pistol,rifle
